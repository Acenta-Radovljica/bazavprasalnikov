<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acenta — Cross-client insights</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header id="nav"></header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold text-[#1a1a2e] mb-2">Cross-client insights</h1>
    <p class="text-sm text-gray-500 mb-6">Tedenska AI analiza vzorcev čez vse kliente (Faza 5).</p>

    <div id="content"></div>
  </main>

  <script src="/admin/app.js"></script>
  <script>
    renderNav('insights');

    (async () => {
      showLoading('content');
      const data = await apiFetch('/api/insights');
      if (!data || !data.insights) {
        document.getElementById('content').innerHTML = `
          <div class="bg-yellow-50 border border-yellow-200 rounded p-6 text-sm text-yellow-800">
            Cross-client insights še niso generirani. (Faza 5 — tedenski cron še ni nastavljen.)
          </div>
        `;
        return;
      }
      const i = data.insights;
      const vsebina = typeof i.vsebina === 'string' ? i.vsebina : JSON.stringify(i.vsebina, null, 2);
      document.getElementById('content').innerHTML = `
        <div class="bg-white rounded shadow p-6">
          <div class="text-xs text-gray-500 mb-3">Generirano: ${formatDatum(i.generated_at)}</div>
          <pre class="whitespace-pre-wrap text-sm text-gray-800 font-sans">${esc(vsebina)}</pre>
        </div>
      `;
    })();
  </script>
</body>
</html>
