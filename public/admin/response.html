<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acenta — Odgovor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header id="nav"></header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <a id="back" href="/admin/" class="text-sm text-[#00b894] hover:underline">← Nazaj</a>
    <div id="content" class="mt-4"></div>
  </main>

  <script src="/admin/app.js"></script>
  <script>
    renderNav('home');

    const id = qs('id');
    if (!id) {
      document.getElementById('content').innerHTML = '<div class="bg-red-50 text-red-700 p-4 rounded">Manjka ?id= parameter</div>';
      throw new Error('no id');
    }

    // Formatira eno vrednost: arrays → bullet list, '' / [] → '—', string → as-is
    function formatVal(v) {
      if (v == null || v === '') return '<span class="text-gray-400">—</span>';
      if (Array.isArray(v)) {
        if (v.length === 0) return '<span class="text-gray-400">—</span>';
        return '<ul class="list-disc list-inside space-y-1">' +
          v.map(item => `<li>${esc(String(item))}</li>`).join('') + '</ul>';
      }
      if (typeof v === 'object') return `<pre class="text-xs">${esc(JSON.stringify(v, null, 2))}</pre>`;
      return esc(String(v));
    }

    // Renderira odgovore. Ce so na voljo questions, uporabimo nje za vrstni red + label-e.
    function renderRawData(raw, questions) {
      if (!raw || typeof raw !== 'object') return '<div class="text-gray-400">—</div>';

      const qList = Array.isArray(questions) ? questions : [];
      const qById = new Map(qList.map(q => [q.id, q]));

      // Zaporedje: najprej po questions array (vprasalnik definicija), nato preostali kljuci (npr. gdpr_consent, drugo)
      const handled = new Set();
      const rows = [];

      for (const q of qList) {
        const v = raw[q.id];
        const obvezno = !!q.obvezno;
        const prazno = v == null || v === '' || (Array.isArray(v) && v.length === 0);
        // Preskoci prazna NEOBVEZNA polja (manj smetenja)
        if (prazno && !obvezno) { handled.add(q.id); continue; }
        rows.push({
          label: q.label || q.id,
          id: q.id,
          html: formatVal(v),
        });
        handled.add(q.id);
      }

      // Dodaj preostala polja, ki niso v questions (gdpr_consent, ipd.)
      const meta = { gdpr_consent: 'GDPR consent' };
      for (const [k, v] of Object.entries(raw)) {
        if (handled.has(k)) continue;
        if (v == null || v === '') continue;
        rows.push({
          label: meta[k] || k,
          id: k,
          html: formatVal(v),
        });
      }

      if (!rows.length) return '<div class="text-gray-400">—</div>';

      const vrstice = rows.map(r => `
        <tr class="border-b last:border-b-0 hover:bg-gray-50/50">
          <td class="px-4 py-3 text-sm font-medium text-gray-800 align-top w-2/5">
            ${esc(r.label)}
            <div class="text-[10px] text-gray-400 mt-0.5 font-normal">${esc(r.id)}</div>
          </td>
          <td class="px-4 py-3 text-sm text-gray-900 whitespace-pre-wrap align-top">${r.html}</td>
        </tr>
      `).join('');
      return `<table class="w-full bg-white rounded-lg shadow-sm overflow-hidden">${vrstice}</table>`;
    }

    (async () => {
      showLoading('content');
      const data = await apiFetch(`/api/responses/${id}`);
      if (!data?.response) {
        showError('content', 'Odgovor ni najden.');
        return;
      }
      const r = data.response;
      document.getElementById('back').href = `/admin/company.html?id=${r.company_id}`;

      const povzetek = r.ai_povzetek
        ? `<pre class="whitespace-pre-wrap text-sm text-gray-800 font-sans bg-white p-4 rounded shadow">${esc(r.ai_povzetek)}</pre>`
        : '<div class="text-sm text-gray-400 italic">AI povzetek še ni generiran.</div>';

      const gdpr = r.consent_gdpr ? 'DA ✓' : 'NE';

      document.getElementById('content').innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-[#1a1a2e]">Odgovor #${r.id}</h1>
          <div class="text-sm text-gray-500 mt-1">
            <a class="text-[#00b894] hover:underline" href="/admin/company.html?id=${r.company_id}">${esc(r.naziv_prikaz)}</a>
            · ${formatDatum(r.submitted_at)} · GDPR: ${gdpr}
          </div>
        </div>

        <div class="mb-6">
          <h2 class="text-lg font-bold text-[#1a1a2e] mb-3">AI povzetek</h2>
          ${povzetek}
        </div>

        <div>
          <h2 class="text-lg font-bold text-[#1a1a2e] mb-3">Surovi odgovori</h2>
          ${renderRawData(r.raw_data, r.q_questions)}
        </div>
      `;
    })();
  </script>
</body>
</html>
