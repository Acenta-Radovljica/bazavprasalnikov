<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acenta — Podjetje</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header id="nav"></header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <a href="/admin/" class="text-sm text-[#00b894] hover:underline">← Nazaj na seznam</a>

    <div id="header" class="mt-4 mb-6"></div>

    <div id="priporocila-section" class="mb-8"></div>

    <h2 class="text-xl font-bold text-[#1a1a2e] mb-4">Odgovori</h2>
    <div id="responses"></div>
  </main>

  <script src="/admin/app.js"></script>
  <script>
    renderNav('home');

    const id = qs('id');
    if (!id) {
      document.getElementById('header').innerHTML = '<div class="bg-red-50 text-red-700 p-4 rounded">Manjka ?id= parameter</div>';
      throw new Error('no id');
    }

    function renderHeader(company) {
      const ai = company.ai_priporocila_updated_at
        ? `AI priporočila: ${formatDatum(company.ai_priporocila_updated_at)}`
        : 'AI priporočila še niso generirana';

      document.getElementById('header').innerHTML = `
        <div class="bg-white rounded shadow p-6">
          <h1 class="text-2xl font-bold text-[#1a1a2e] mb-2">${esc(company.naziv_prikaz)}</h1>
          <div class="text-sm text-gray-500 mb-4">
            Normalizirano: <code class="bg-gray-100 px-1 rounded">${esc(company.naziv_normaliziran)}</code> · ${ai}
          </div>
          <div class="flex flex-wrap gap-2">
            <button onclick="regenerirajPriporocila()" class="px-4 py-2 bg-[#00b894] text-white rounded text-sm hover:bg-[#019272]">
              Regeneriraj priporočila
            </button>
            <button onclick="regenerirajVse()" class="px-4 py-2 bg-[#1a1a2e] text-white rounded text-sm hover:bg-black">
              Regeneriraj VSE (povzetki + priporočila)
            </button>
            <button onclick="odpriMerge()" class="px-4 py-2 border border-gray-300 rounded text-sm hover:bg-gray-50">
              Zlij z drugim podjetjem
            </button>
            <button onclick="izbrisiPodjetje()" class="px-4 py-2 border border-red-300 text-red-700 rounded text-sm hover:bg-red-50">
              GDPR izbris
            </button>
          </div>
        </div>
      `;
    }

    function renderPriporocila(company) {
      const el = document.getElementById('priporocila-section');
      if (!company.ai_priporocila) {
        el.innerHTML = `
          <div class="bg-yellow-50 border border-yellow-200 rounded p-4 text-sm text-yellow-800">
            AI priporočila še niso generirana. Klikni "Regeneriraj priporočila" za zagon.
          </div>
        `;
        return;
      }
      el.innerHTML = `
        <div class="bg-white rounded shadow p-6">
          <h2 class="text-lg font-bold text-[#1a1a2e] mb-3">AI priporočila za delavnico</h2>
          <pre class="whitespace-pre-wrap text-sm text-gray-800 font-sans">${esc(company.ai_priporocila)}</pre>
        </div>
      `;
    }

    function renderResponses(responses) {
      const el = document.getElementById('responses');
      if (!responses.length) {
        el.innerHTML = '<div class="bg-white rounded shadow p-6 text-gray-500">Še ni odgovorov.</div>';
        return;
      }
      el.innerHTML = responses.map(r => {
        const povzetek = r.ai_povzetek
          ? `<pre class="whitespace-pre-wrap text-sm text-gray-700 font-sans mt-3 bg-gray-50 p-3 rounded">${esc(r.ai_povzetek)}</pre>`
          : '<div class="mt-3 text-sm text-gray-400 italic">AI povzetek še ni generiran...</div>';
        return `
          <div class="bg-white rounded shadow p-5 mb-3">
            <div class="flex items-center justify-between mb-2">
              <a href="/admin/response.html?id=${r.id}" class="text-sm font-medium text-[#00b894] hover:underline">
                Odgovor #${r.id}
              </a>
              <span class="text-xs text-gray-500">${formatDatum(r.submitted_at)}</span>
            </div>
            ${povzetek}
          </div>
        `;
      }).join('');
    }

    async function regenerirajPriporocila() {
      if (!confirm('Zagnati regeneracijo priporočil? (~70 sekund)')) return;
      const r = await apiFetch(`/api/companies/${id}/regenerate-ai`, {
        method: 'POST',
        body: JSON.stringify({ mode: 'priporocila' }),
      });
      if (r?.ok) alert('Sproženo. Osveži stran čez ~70s.');
      else alert('Napaka pri sproženju.');
    }

    async function regenerirajVse() {
      if (!confirm('Zagnati regeneracijo VSEH povzetkov + priporočil? (lahko traja minute)')) return;
      const r = await apiFetch(`/api/companies/${id}/regenerate-ai`, {
        method: 'POST',
        body: JSON.stringify({ mode: 'vse' }),
      });
      if (r?.ok) alert('Sproženo. Osveži stran čez nekaj minut.');
      else alert('Napaka pri sproženju.');
    }

    async function odpriMerge() {
      const target = prompt('ID podjetja v katerega želiš zliti TO podjetje:');
      if (!target) return;
      const targetId = parseInt(target, 10);
      if (!Number.isInteger(targetId)) { alert('Neveljaven ID.'); return; }
      if (!confirm(`Zlij podjetje #${id} → #${targetId}? To se NE da razveljaviti.`)) return;
      const r = await apiFetch(`/api/companies/${id}/merge`, {
        method: 'POST',
        body: JSON.stringify({ target_id: targetId }),
      });
      if (r?.ok) {
        alert(`Zlitje uspešno. Premaknjenih ${r.moved_responses} odgovorov.`);
        window.location.href = `/admin/company.html?id=${targetId}`;
      } else {
        alert('Napaka pri zlitju.');
      }
    }

    async function izbrisiPodjetje() {
      if (!confirm('GDPR izbris IZBRIŠE podjetje IN vse odgovore. Si prepričan/a?')) return;
      if (!confirm('Zares? Operacija ni razveljavljiva.')) return;
      const r = await apiFetch(`/api/companies/${id}`, { method: 'DELETE' });
      if (r?.ok) {
        alert('Izbrisano.');
        window.location.href = '/admin/';
      } else {
        alert('Napaka pri izbrisu.');
      }
    }

    (async () => {
      const data = await apiFetch(`/api/companies/${id}`);
      if (!data) {
        document.getElementById('header').innerHTML = '<div class="bg-red-50 text-red-700 p-4 rounded">Napaka pri nalaganju.</div>';
        return;
      }
      renderHeader(data.company);
      renderPriporocila(data.company);
      renderResponses(data.responses ?? []);
    })();
  </script>
</body>
</html>
